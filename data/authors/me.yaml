  bio: |
    Stefano Blando is a PhD Researcher within the National PhD Program in AI (SSSA & UniPi).
    His research combines Agent-Based Modeling, Multi-Agent Reinforcement Learning, and Graph
    Neural Networks to develop adaptive cognitive architectures for economic agents in complex
    socio-economic networks. He employs Statistical Model Checking and robust statistical methods
    to bridge the gap between theoretical models and empirical validation, with growing interests
    in Agentic AI for economic simulation.

